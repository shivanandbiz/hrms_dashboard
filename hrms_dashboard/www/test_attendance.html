<!DOCTYPE html>
<html>

<head>
    <title>Team Attendance API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .result {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        pre {
            background: #fff;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }

        button {
            background: #5c6ac4;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #4a5ab3;
        }

        .error {
            color: #d32f2f;
        }

        .success {
            color: #388e3c;
        }
    </style>
</head>

<body>
    <h1>Team Attendance API Diagnostic</h1>
    <p>This page tests the team attendance API and shows the raw response.</p>

    <button onclick="testAPI()">Test API</button>
    <button onclick="location.reload()">Refresh</button>

    <div class="result" id="result" style="display:none;">
        <h3>API Response:</h3>
        <div id="status"></div>
        <pre id="response"></pre>

        <h3>Analysis:</h3>
        <div id="analysis"></div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            const responseDiv = document.getElementById('response');
            const analysisDiv = document.getElementById('analysis');

            resultDiv.style.display = 'block';
            statusDiv.innerHTML = '<p>Loading...</p>';
            responseDiv.textContent = '';
            analysisDiv.innerHTML = '';

            try {
                const response = await fetch('/api/method/hrms_dashboard.api.team_attendance_api.get_team_attendance_status');
                const data = await response.json();

                // Display status
                if (response.ok) {
                    statusDiv.innerHTML = '<p class="success">✓ API call successful (HTTP 200)</p>';
                } else {
                    statusDiv.innerHTML = `<p class="error">✗ API call failed (HTTP ${response.status})</p>`;
                }

                // Display raw response
                responseDiv.textContent = JSON.stringify(data, null, 2);

                // Analyze response
                let analysis = '<ul>';

                if (data.message) {
                    const msg = data.message;

                    if (msg.success) {
                        analysis += '<li class="success">✓ Success: true</li>';
                        analysis += `<li>Total Team: ${msg.total_team || 0}</li>`;
                        analysis += `<li>Not Yet In: ${msg.not_yet_in?.length || 0}</li>`;
                        analysis += `<li>Late Arrivals: ${msg.late_arrivals?.length || 0}</li>`;
                        analysis += `<li>On Time: ${msg.on_time?.length || 0}</li>`;

                        if (msg.not_yet_in && msg.not_yet_in.length > 0) {
                            analysis += '<li><strong>Not Yet In Employees:</strong><ul>';
                            msg.not_yet_in.forEach(emp => {
                                analysis += `<li>${emp.employee_name} (${emp.initials})</li>`;
                            });
                            analysis += '</ul></li>';
                        }

                        if (msg.late_arrivals && msg.late_arrivals.length > 0) {
                            analysis += '<li><strong>Late Arrivals:</strong><ul>';
                            msg.late_arrivals.forEach(emp => {
                                analysis += `<li>${emp.employee_name} (${emp.initials})</li>`;
                            });
                            analysis += '</ul></li>';
                        }

                        if (msg.on_time && msg.on_time.length > 0) {
                            analysis += '<li><strong>On Time:</strong><ul>';
                            msg.on_time.forEach(emp => {
                                analysis += `<li>${emp.employee_name} (${emp.initials})</li>`;
                            });
                            analysis += '</ul></li>';
                        }
                    } else {
                        analysis += '<li class="error">✗ Success: false</li>';
                        analysis += `<li class="error">Message: ${msg.message || 'No message'}</li>`;

                        // Common issues
                        if (msg.message && msg.message.includes('Employee record not found')) {
                            analysis += '<li class="error"><strong>Issue:</strong> Current user does not have an Employee record</li>';
                            analysis += '<li><strong>Solution:</strong> Go to HR > Employee and create/link an employee record for the logged-in user</li>';
                        } else if (msg.message && msg.message.includes('No reporting employees')) {
                            analysis += '<li class="error"><strong>Issue:</strong> No employees report to you</li>';
                            analysis += '<li><strong>Solution:</strong> Go to HR > Employee and set the "Reports To" field for employees who should report to you</li>';
                        }
                    }
                } else {
                    analysis += '<li class="error">✗ No message in response</li>';
                }

                analysis += '</ul>';
                analysisDiv.innerHTML = analysis;

            } catch (error) {
                statusDiv.innerHTML = '<p class="error">✗ Error calling API</p>';
                responseDiv.textContent = error.toString();
                analysisDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            testAPI();
        });
    </script>
</body>

</html>
